name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8.12.0'

jobs:
  # -------------------------------------------------------------------
  # Install once, reuse artifacts in downstream jobs
  # -------------------------------------------------------------------
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @read-pal/shared build

      # Upload node_modules + shared dist for downstream jobs
      - uses: actions/upload-artifact@v4
        with:
          name: node-deps
          path: |
            node_modules
            packages/shared/dist
            packages/web/node_modules
            packages/web/.next
          retention-days: 1

  # -------------------------------------------------------------------
  # Typecheck frontend
  # -------------------------------------------------------------------
  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: node-deps

      - name: Typecheck frontend
        run: pnpm --filter @read-pal/web typecheck

  # -------------------------------------------------------------------
  # Build verification
  # -------------------------------------------------------------------
  build:
    name: Build (${{ matrix.package }})
    needs: install
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [shared, web]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: node-deps

      - name: Build ${{ matrix.package }}
        run: pnpm --filter @read-pal/${{ matrix.package }} build
        env:
          NEXT_PUBLIC_API_URL: ''

  # -------------------------------------------------------------------
  # Python backend tests
  # -------------------------------------------------------------------
  test-backend:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache uv virtualenv
        uses: actions/cache@v4
        with:
          path: packages/server/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('packages/server/pyproject.toml') }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          cd packages/server
          uv sync

      - name: Run tests
        run: |
          cd packages/server
          uv run pytest
        env:
          APP_ENV: test
          JWT_SECRET: test-jwt-secret-for-ci-min-32-chars-long
