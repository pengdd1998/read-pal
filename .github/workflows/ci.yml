name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8.12.0'

jobs:
  # -------------------------------------------------------------------
  # Typecheck frontend
  # -------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @read-pal/shared build

      - run: pnpm --filter @read-pal/web typecheck

  # -------------------------------------------------------------------
  # Build verification
  # -------------------------------------------------------------------
  build:
    name: Build (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [shared, web]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared first (dependency for web)
        if: matrix.package != 'shared'
        run: pnpm --filter @read-pal/shared build

      - name: Build ${{ matrix.package }}
        run: pnpm --filter @read-pal/${{ matrix.package }} build
        env:
          NEXT_PUBLIC_API_URL: ''

  # -------------------------------------------------------------------
  # Python backend tests
  # -------------------------------------------------------------------
  test-backend:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache uv virtualenv
        uses: actions/cache@v4
        with:
          path: packages/server/.venv
          key: venv-dev-${{ runner.os }}-${{ hashFiles('packages/server/pyproject.toml', 'packages/server/uv.lock') }}

      - run: pip install uv

      - run: cd packages/server && uv sync --dev

      - run: cd packages/server && uv run pytest
        env:
          APP_ENV: test
          JWT_SECRET: test-jwt-secret-for-ci-min-32-chars-long
