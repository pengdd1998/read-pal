name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8.12.0'

jobs:
  # -------------------------------------------------------------------
  # Typecheck frontend
  # -------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package (required for typecheck)
        run: pnpm --filter @read-pal/shared build

      - name: Typecheck frontend
        run: pnpm typecheck

  # -------------------------------------------------------------------
  # Build verification
  # -------------------------------------------------------------------
  build:
    name: Build (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      fail-fast: false
      matrix:
        package: [shared, web]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared first (dependency for web)
        if: matrix.package != 'shared'
        run: pnpm --filter @read-pal/shared build

      - name: Build ${{ matrix.package }}
        run: pnpm --filter @read-pal/${{ matrix.package }} build
        env:
          NEXT_PUBLIC_API_URL: ''

  # -------------------------------------------------------------------
  # Python backend tests
  # -------------------------------------------------------------------
  test-backend:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: cd packages/server && uv sync

      - name: Run tests
        run: cd packages/server && pytest
        env:
          APP_ENV: test
          JWT_SECRET: test-jwt-secret-for-ci-min-32-chars-long
