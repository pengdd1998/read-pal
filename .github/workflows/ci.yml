name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8.12.0'

jobs:
  # -------------------------------------------------------------------
  # Typecheck across the entire monorepo
  # -------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package (required for typecheck)
        run: pnpm --filter @read-pal/shared build

      - name: Typecheck all packages
        run: pnpm typecheck

  # -------------------------------------------------------------------
  # Build verification
  # -------------------------------------------------------------------
  build:
    name: Build (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      fail-fast: false
      matrix:
        package: [shared, api, web]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared first (dependency for api & web)
        if: matrix.package \!= 'shared'
        run: pnpm --filter @read-pal/shared build

      - name: Build ${{ matrix.package }}
        run: pnpm --filter @read-pal/${{ matrix.package }} build
        env:
          NEXT_PUBLIC_API_URL: ''

  # -------------------------------------------------------------------
  # Unit tests (API only — mocks all external services)
  # -------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @read-pal/shared build

      - name: Run unit tests
        run: pnpm --filter @read-pal/api test -- --testPathPattern=tests/unit
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-for-ci-min-32-chars-long
