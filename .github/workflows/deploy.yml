name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /home/ubuntu/read-pal

            echo ">>> Pulling latest code..."
            git pull origin main

            # Use BuildKit cache to avoid re-downloading layers
            export DOCKER_BUILDKIT=1

            echo ">>> Building (with layer cache)..."
            docker compose build --pull

            echo ">>> Starting containers..."
            docker compose up -d --remove-orphans

            echo ">>> Running database migrations..."
            docker compose exec -T api python -m alembic upgrade head

            echo ">>> Waiting for services..."
            sleep 10

            echo ">>> Health check..."
            API_STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost/api/v1/health 2>/dev/null || echo "000")
            WEB_STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost 2>/dev/null || echo "000")

            if [ "$API_STATUS" != "200" ]; then
              echo "❌ API health check failed: $API_STATUS"
              docker compose logs api --tail 50
              exit 1
            fi

            if [ "$WEB_STATUS" != "200" ]; then
              echo "❌ Web health check failed: $WEB_STATUS"
              docker compose logs web --tail 50
              exit 1
            fi

            echo "✅ Deploy complete — API: $API_STATUS, Web: $WEB_STATUS"
