name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            DEPLOY_PATH="/home/ubuntu/projects/read-pal"
            cd "$DEPLOY_PATH"

            # -------------------------------------------------------
            # 1. Pull latest code
            # -------------------------------------------------------
            echo ">>> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # -------------------------------------------------------
            # 2. Rebuild containers with layer cache
            # -------------------------------------------------------
            echo ">>> Rebuilding containers..."
            export DOCKER_BUILDKIT=1
            docker compose build

            # -------------------------------------------------------
            # 3. Start containers (recreates changed services)
            # -------------------------------------------------------
            echo ">>> Starting containers..."
            docker compose up -d --remove-orphans

            # Restart nginx to pick up new upstream IPs
            sleep 3
            docker compose restart nginx

            # -------------------------------------------------------
            # 4. Run database migrations
            # -------------------------------------------------------
            echo ">>> Running database migrations..."
            docker compose exec -T api alembic upgrade head

            # -------------------------------------------------------
            # 5. Health checks with retry
            # -------------------------------------------------------
            echo ">>> Waiting for services to be ready..."

            check_health() {
              local name="$1"
              local url="$2"
              local status="000"
              for i in 1 2 3 4 5 6; do
                status=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$url" || echo "000")
                if [ "$status" = "200" ]; then
                  echo "  $name OK (attempt $i)"
                  return 0
                fi
                echo "  $name not ready (attempt $i, status=$status)..."
                sleep 10
              done
              echo "❌ $name health check failed: $status"
              return 1
            }

            check_health "API" "http://localhost:8090/api/v1/health"
            check_health "Web" "http://localhost:8090/en"

            # -------------------------------------------------------
            # 6. Cleanup temporary files
            # -------------------------------------------------------
            echo ">>> Cleaning up..."
            docker system prune -f --filter "until=24h" 2>/dev/null || true
            docker builder prune -f --filter "until=24h" 2>/dev/null || true

            DISK_USAGE=$(df -h . | tail -1 | awk '{print $5}')
            echo "✅ Deploy complete — Disk usage: $DISK_USAGE"
