name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Server
    runs-on: self-hosted
    steps:
      - name: Pull and deploy
        working-directory: /home/ubuntu/read-pal
        run: bash /home/ubuntu/deploy.sh
