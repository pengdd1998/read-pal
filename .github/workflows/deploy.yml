name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd /home/ubuntu/read-pal

            echo ">>> Pulling latest code..."
            git pull origin main

            echo ">>> Rebuilding containers with layer cache..."
            export DOCKER_BUILDKIT=1
            docker compose build

            echo ">>> Starting containers..."
            docker compose up -d --remove-orphans

            echo ">>> Running database migrations..."
            docker compose exec -T api python -m alembic upgrade head

            echo ">>> Waiting for services..."
            sleep 15

            echo ">>> Health check..."
            API_STATUS=$(curl -sf -o /dev/null -w '%{http_code}' --max-time 10 http://localhost/api/v1/health || echo "000")
            WEB_STATUS=$(curl -sf -o /dev/null -w '%{http_code}' --max-time 10 http://localhost || echo "000")

            if [ "$API_STATUS" != "200" ]; then
              echo "❌ API health check failed: $API_STATUS"
              docker compose logs api --tail 50
              exit 1
            fi

            if [ "$WEB_STATUS" != "200" ]; then
              echo "❌ Web health check failed: $WEB_STATUS"
              docker compose logs web --tail 50
              exit 1
            fi

            echo "✅ Deploy complete — API: $API_STATUS, Web: $WEB_STATUS"
