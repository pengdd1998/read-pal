name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # Only deploy after CI passes (ci.yml runs on same push)
    if: github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /home/ubuntu/read-pal

            echo ">>> Pulling latest code..."
            git pull origin main

            echo ">>> Installing Python dependencies..."
            cd packages/server
            uv sync

            echo ">>> Running database migrations..."
            uv run alembic upgrade head

            cd ../..

            echo ">>> Installing Node dependencies..."
            pnpm install --frozen-lockfile 2>/dev/null || pnpm install

            echo ">>> Building shared package..."
            pnpm --filter @read-pal/shared build

            echo ">>> Building web..."
            NEXT_PUBLIC_API_URL= pnpm --filter @read-pal/web build

            echo ">>> Restarting services..."
            pm2 restart read-pal-api read-pal-web

            echo ">>> Waiting for services..."
            sleep 5

            echo ">>> Health check..."
            API_STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/api/v1/health 2>/dev/null || echo "000")
            WEB_STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000 2>/dev/null || echo "000")

            if [ "$API_STATUS" != "200" ]; then
              echo "❌ API health check failed: $API_STATUS"
              pm2 logs read-pal-api --lines 30 --nostream
              exit 1
            fi

            if [ "$WEB_STATUS" != "200" ]; then
              echo "❌ Web health check failed: $WEB_STATUS"
              pm2 logs read-pal-web --lines 30 --nostream
              exit 1
            fi

            echo "✅ Deploy complete — API: $API_STATUS, Web: $WEB_STATUS"
