version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: readpal
      POSTGRES_USER: readpal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readpal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      APP_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: readpal
      DB_USER: readpal
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      REDIS_URL: redis://redis:6379
      GLM_API_KEY: ${GLM_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
