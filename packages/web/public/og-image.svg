<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="50%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative orbs -->
  <circle cx="200" cy="150" r="200" fill="url(#glow)" opacity="0.5"/>
  <circle cx="1000" cy="480" r="180" fill="url(#glow)" opacity="0.4"/>
  <circle cx="600" cy="315" r="300" fill="url(#glow)" opacity="0.2"/>

  <!-- Book icon -->
  <g transform="translate(80, 180)">
    <rect x="0" y="20" width="120" height="140" rx="8" fill="white" opacity="0.1"/>
    <rect x="10" y="10" width="120" height="140" rx="8" fill="url(#accent)" opacity="0.9"/>
    <rect x="25" y="35" width="90" height="6" rx="3" fill="white" opacity="0.8"/>
    <rect x="25" y="50" width="70" height="6" rx="3" fill="white" opacity="0.6"/>
    <rect x="25" y="65" width="80" height="6" rx="3" fill="white" opacity="0.5"/>
    <rect x="25" y="80" width="60" height="6" rx="3" fill="white" opacity="0.4"/>
    <rect x="25" y="95" width="75" height="6" rx="3" fill="white" opacity="0.3"/>
  </g>

  <!-- Main title -->
  <text x="250" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">
    read-pal
  </text>

  <!-- Tagline -->
  <text x="252" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#94a3b8">
    A friend who reads with you.
  </text>

  <!-- Subtitle -->
  <text x="252" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#64748b">
    AI reading companion · Smart highlights · Knowledge graph
  </text>

  <!-- CTA badge -->
  <rect x="252" y="410" width="220" height="48" rx="24" fill="url(#accent)"/>
  <text x="362" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="white" text-anchor="middle">
    Start Reading Free →
  </text>

  <!-- Persona bubbles -->
  <g transform="translate(850, 150)">
    <circle cx="0" cy="80" r="45" fill="#f59e0b" opacity="0.2"/>
    <text x="0" y="88" font-size="40" text-anchor="middle">🦉</text>

    <circle cx="100" cy="40" r="45" fill="#14b8a6" opacity="0.2"/>
    <text x="100" y="48" font-size="40" text-anchor="middle">⭐</text>

    <circle cx="200" cy="80" r="45" fill="#6366f1" opacity="0.2"/>
    <text x="200" y="88" font-size="40" text-anchor="middle">🔍</text>

    <circle cx="80" cy="170" r="45" fill="#ec4899" opacity="0.2"/>
    <text x="80" y="178" font-size="40" text-anchor="middle">🌊</text>

    <circle cx="190" cy="170" r="45" fill="#22c55e" opacity="0.2"/>
    <text x="190" y="178" font-size="40" text-anchor="middle">🎯</text>
  </g>

  <!-- Feature pills at bottom -->
  <g transform="translate(252, 490)">
    <rect x="0" y="0" width="140" height="32" rx="16" fill="white" opacity="0.08"/>
    <text x="70" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">EPUB Reader</text>

    <rect x="155" y="0" width="160" height="32" rx="16" fill="white" opacity="0.08"/>
    <text x="235" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">5 AI Personas</text>

    <rect x="330" y="0" width="170" height="32" rx="16" fill="white" opacity="0.08"/>
    <text x="415" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Smart Highlights</text>

    <rect x="515" y="0" width="160" height="32" rx="16" fill="white" opacity="0.08"/>
    <text x="595" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Reading Streaks</text>
  </g>
</svg>
