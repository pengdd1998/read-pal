<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>read-pal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 360px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #faf8f5; }
    .header { background: linear-gradient(135deg, #f59e0b, #14b8a6); padding: 16px; color: white; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    .content { padding: 12px; }
    .section { margin-bottom: 12px; }
    .section h2 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #9ca3af; margin-bottom: 6px; }
    .card { background: white; border-radius: 10px; border: 1px solid #e5e7eb; padding: 12px; margin-bottom: 8px; }
    .card h3 { font-size: 14px; font-weight: 600; color: #1e3a5f; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card p { font-size: 12px; color: #6b7280; line-height: 1.4; }
    .btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
    .btn-primary:hover { transform: scale(1.02); box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-secondary { background: white; color: #1e3a5f; border: 1px solid #e5e7eb; }
    .btn-secondary:hover { background: #fef3c7; }
    .input { width: 100%; padding: 8px 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 13px; outline: none; transition: border-color 0.15s; }
    .input:focus { border-color: #f59e0b; box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.1); }
    .status { padding: 8px 12px; border-radius: 8px; font-size: 12px; margin-bottom: 8px; }
    .status-success { background: #d1fae5; color: #065f46; }
    .status-error { background: #fee2e2; color: #991b1b; }
    .status-info { background: #fef3c7; color: #92400e; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid white; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .divider { height: 1px; background: #e5e7eb; margin: 12px 0; }
    .recent-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f3f4f6; }
    .recent-item:last-child { border-bottom: none; }
    .recent-dot { width: 6px; height: 6px; border-radius: 50%; background: #f59e0b; flex-shrink: 0; }
    .recent-item span { font-size: 12px; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <div class="header">
    <h1>read-pal</h1>
    <p>Your AI reading companion</p>
  </div>
  <div class="content" id="app">
    <!-- Settings view (shown when not configured) -->
    <div id="settings-view" style="display:none">
      <div class="section">
        <h2>Connect to read-pal</h2>
        <div class="card">
          <p>Enter your read-pal server URL and API token to start saving articles.</p>
        </div>
        <input type="url" id="server-url" class="input" placeholder="https://your-readpal-server.com" style="margin-bottom:8px" />
        <input type="text" id="api-token" class="input" placeholder="Your API token" />
        <div style="margin-top:10px">
          <button id="save-settings" class="btn btn-primary">Save Settings</button>
        </div>
      </div>
    </div>

    <!-- Main view (shown when configured) -->
    <div id="main-view" style="display:none">
      <div class="section">
        <h2>Current Page</h2>
        <div class="card">
          <h3 id="page-title">Loading...</h3>
          <p id="page-url" style="font-size:11px;color:#9ca3af;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></p>
        </div>
        <button id="save-article" class="btn btn-primary">Save to read-pal</button>
        <div id="save-status" style="display:none"></div>
      </div>

      <div class="divider"></div>

      <div class="section">
        <h2>Quick Actions</h2>
        <button id="open-reader" class="btn btn-secondary" style="margin-bottom:6px">Open read-pal</button>
        <button id="open-settings" class="btn btn-secondary">Settings</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
